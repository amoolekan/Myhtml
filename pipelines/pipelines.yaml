# File: azure-pipelines.yml
trigger:
  branches:
    include:
      - main  # or your default branch
      - branch3

pool:
  name: azure_pool # Can also be Red Hat self-hosted if you prefer

variables:
  azureSubscription: 'MyUMI' # DevOps service connection
  appName: 'myapp002'

steps:
# Step 1: Checkout code from GitHub
- task: Checkout@2
  displayName: 'Checkout GitHub repository'

# Step 3: Deploy entire repo folder directly to Azure App Service
- task: AzureWebApp@1
  inputs:
    azureSubscription: '$(azureSubscription)'
    appType: 'webAppLinux'
    appName: '$(appName)'
    package: '$(Build.SourcesDirectory)'   # Deploys all files in repo
